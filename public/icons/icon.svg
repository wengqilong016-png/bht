<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer background - deep crimson -->
  <rect width="512" height="512" rx="108" fill="#7B1818"/>

  <!-- Gold outer border ring -->
  <rect x="10" y="10" width="492" height="492" rx="100" fill="none" stroke="#C9A027" stroke-width="6"/>
  <rect x="18" y="18" width="476" height="476" rx="94" fill="none" stroke="#E2B84A" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Background inner panel - slightly lighter terracotta -->
  <rect x="26" y="26" width="460" height="460" rx="86" fill="#8C2020"/>

  <!-- Ornamental corner decorations (African knotwork motif) -->
  <!-- Top-left corner ornament -->
  <circle cx="72" cy="72" r="18" fill="none" stroke="#C9A027" stroke-width="3"/>
  <circle cx="72" cy="72" r="9" fill="#C9A027" opacity="0.6"/>
  <!-- Top-right corner ornament -->
  <circle cx="440" cy="72" r="18" fill="none" stroke="#C9A027" stroke-width="3"/>
  <circle cx="440" cy="72" r="9" fill="#C9A027" opacity="0.6"/>
  <!-- Bottom-left corner ornament -->
  <circle cx="72" cy="440" r="18" fill="none" stroke="#C9A027" stroke-width="3"/>
  <circle cx="72" cy="440" r="9" fill="#C9A027" opacity="0.6"/>
  <!-- Bottom-right corner ornament -->
  <circle cx="440" cy="440" r="18" fill="none" stroke="#C9A027" stroke-width="3"/>
  <circle cx="440" cy="440" r="9" fill="#C9A027" opacity="0.6"/>

  <!-- Side mid-ornaments -->
  <circle cx="256" cy="46" r="7" fill="#C9A027" opacity="0.7"/>
  <circle cx="256" cy="466" r="7" fill="#C9A027" opacity="0.7"/>
  <circle cx="46" cy="256" r="7" fill="#C9A027" opacity="0.7"/>
  <circle cx="466" cy="256" r="7" fill="#C9A027" opacity="0.7"/>

  <!-- Subtle carved background pattern (horizontal lines) -->
  <rect x="60" y="104" width="392" height="2" fill="#6A1010" rx="1"/>
  <rect x="60" y="114" width="392" height="1" fill="#6A1010" rx="1" opacity="0.5"/>
  <rect x="60" y="394" width="392" height="2" fill="#6A1010" rx="1"/>
  <rect x="60" y="404" width="392" height="1" fill="#6A1010" rx="1" opacity="0.5"/>

  <!-- "URITHI WA NEEMA" top text -->
  <text x="256" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" letter-spacing="4" fill="#E2B84A" opacity="0.9">URITHI WA NEEMA</text>

  <!-- ======= Central "B" Monogram — interlocking loops ======= -->
  <!-- Left loop of B (teal/turquoise) -->
  <ellipse cx="218" cy="225" rx="62" ry="78" fill="none" stroke="#1E9B9B" stroke-width="22"/>
  <ellipse cx="218" cy="225" rx="62" ry="78" fill="none" stroke="#2BB8B8" stroke-width="14"/>

  <!-- Right loop of B (gold) -->
  <ellipse cx="294" cy="260" rx="62" ry="78" fill="none" stroke="#B8860B" stroke-width="22"/>
  <ellipse cx="294" cy="260" rx="62" ry="78" fill="none" stroke="#D4A017" stroke-width="14"/>

  <!-- Cover/blend overlap area to create interlock illusion -->
  <rect x="236" y="162" width="36" height="56" fill="#8C2020"/>
  <rect x="236" y="274" width="36" height="42" fill="#8C2020"/>

  <!-- Re-draw front strokes for interlock effect -->
  <!-- Teal loop front segment (top arc) -->
  <path d="M218 147 A62 78 0 0 1 280 225" fill="none" stroke="#2BB8B8" stroke-width="14"/>
  <!-- Gold loop back segment (bottom arc) -->
  <path d="M294 338 A62 78 0 0 1 232 260" fill="none" stroke="#D4A017" stroke-width="14"/>

  <!-- Jewel / flower accent at intersection center -->
  <circle cx="256" cy="243" r="22" fill="#1A2A3A"/>
  <!-- Petal definition + 8-way rotation -->
  <defs>
    <ellipse id="bht-petal" cx="256" cy="225" rx="7" ry="10" fill="#2DBFBF"/>
  </defs>
  <use href="#bht-petal" transform="rotate(0 256 243)"/>
  <use href="#bht-petal" transform="rotate(45 256 243)"/>
  <use href="#bht-petal" transform="rotate(90 256 243)"/>
  <use href="#bht-petal" transform="rotate(135 256 243)"/>
  <use href="#bht-petal" transform="rotate(180 256 243)"/>
  <use href="#bht-petal" transform="rotate(225 256 243)"/>
  <use href="#bht-petal" transform="rotate(270 256 243)"/>
  <use href="#bht-petal" transform="rotate(315 256 243)"/>
  <!-- Center gem -->
  <circle cx="256" cy="243" r="10" fill="#1E6B8A"/>
  <circle cx="256" cy="243" r="6" fill="#2DBFBF"/>
  <circle cx="253" cy="240" r="2.5" fill="white" opacity="0.7"/>

  <!-- ======= Bottom text area ======= -->
  <!-- Divider line above BAHATI -->
  <line x1="80" y1="360" x2="432" y2="360" stroke="#C9A027" stroke-width="1.5" opacity="0.6"/>

  <!-- BAHATI large text -->
  <text x="256" y="405" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="bold" letter-spacing="6" fill="#D4A017">BAHATI</text>

  <!-- BHT ELECTRONICS small text -->
  <text x="256" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" letter-spacing="3" fill="#E2B84A" opacity="0.85">BHT ELECTRONICS</text>

  <!-- LEGACY OF GOOD FORTUNE -->
  <text x="256" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="2.5" fill="#C9A027" opacity="0.7">LEGACY OF GOOD FORTUNE</text>
</svg>