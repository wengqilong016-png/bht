<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: deep amber/gold gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Slot machine body -->
  <rect x="104" y="120" width="304" height="240" rx="24" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <!-- Screen area -->
  <rect x="128" y="144" width="256" height="140" rx="14" fill="url(#screen)"/>
  <!-- Three reel windows -->
  <rect x="148" y="164" width="64" height="80" rx="10" fill="#0f172a"/>
  <rect x="224" y="164" width="64" height="80" rx="10" fill="#0f172a"/>
  <rect x="300" y="164" width="64" height="80" rx="10" fill="#0f172a"/>
  <!-- Reel symbols: three coins (win state) -->
  <circle cx="180" cy="204" r="22" fill="url(#coin)"/>
  <text x="180" y="211" text-anchor="middle" font-size="22" font-weight="900" fill="#92400e">¥</text>
  <circle cx="256" cy="204" r="22" fill="url(#coin)"/>
  <text x="256" y="211" text-anchor="middle" font-size="22" font-weight="900" fill="#92400e">¥</text>
  <circle cx="332" cy="204" r="22" fill="url(#coin)"/>
  <text x="332" y="211" text-anchor="middle" font-size="22" font-weight="900" fill="#92400e">¥</text>
  <!-- Win line -->
  <line x1="128" y1="204" x2="384" y2="204" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- Pay line label -->
  <rect x="128" y="298" width="256" height="28" rx="8" fill="#0f172a"/>
  <text x="256" y="317" text-anchor="middle" font-size="15" font-weight="800" fill="#fbbf24" letter-spacing="3">BAHATI PRO</text>
  <!-- Lever knob -->
  <circle cx="428" cy="200" r="18" fill="url(#coin)"/>
  <rect x="420" y="200" width="16" height="80" rx="8" fill="#92400e"/>
  <!-- Coin slot -->
  <rect x="210" y="376" width="92" height="14" rx="7" fill="#334155"/>
  <!-- Bottom decorative coins -->
  <circle cx="160" cy="404" r="16" fill="url(#coin)" opacity="0.85"/>
  <circle cx="256" cy="410" r="20" fill="url(#coin)"/>
  <text x="256" y="418" text-anchor="middle" font-size="18" font-weight="900" fill="#92400e">B</text>
  <circle cx="352" cy="404" r="16" fill="url(#coin)" opacity="0.85"/>
</svg>
