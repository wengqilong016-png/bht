
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BAHATI JACKPOTS</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bahati Pro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on older iOS */
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
        /* 适配刘海屏 */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* Prevent horizontal overflow on all screen sizes */
        * { box-sizing: border-box; }
        #root { max-width: 100vw; overflow-x: hidden; }
        /* Fallback loading screen – shown until React mounts */
        #app-loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0f172a; color: #f8fafc;
            font-family: -apple-system, sans-serif;
            z-index: 9999;
        }
        #app-loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid #f59e0b33;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app-loading p { font-size: 10px; font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase; color: #f59e0b80; }
    </style>
    <!-- es-module-shims: polyfill for importmap on Safari < 16.4 and other older browsers -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-y-auto overflow-x-hidden">
    <!-- Fallback loading indicator shown before React mounts -->
    <div id="app-loading">
        <div class="spinner"></div>
        <p>Bahati Engine Initializing...</p>
    </div>
    <div id="root"></div>
    <!-- Entry Point -->
    <script type="module" src="./index.tsx"></script>
    <script>
      // Hide native loading overlay once React has rendered something in #root
      (function() {
        var loading = document.getElementById('app-loading');
        if (!loading) return;
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').childNodes.length > 0) {
            loading.style.display = 'none';
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
        // Safety timeout: hide after 15s regardless
        setTimeout(function() { loading.style.display = 'none'; }, 15000);
      })();

      // Register Service Worker for PWA capabilities
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
</body>
</html>
