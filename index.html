
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BAHATI JACKPOTS</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#102C57">
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="alternate icon" href="/icons/icon-192.png">
    
    <!-- iOS Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bahati Pro">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on older iOS */
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
        /* 适配刘海屏 */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* Prevent horizontal overflow on all screen sizes */
        * { box-sizing: border-box; }
        #root { max-width: 100vw; overflow-x: hidden; }
        /* Fallback loading screen – shown until React mounts */
        #app-loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0f172a; color: #f8fafc;
            font-family: -apple-system, sans-serif;
            z-index: 9999;
        }
        #app-loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid #f59e0b33;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app-loading p { font-size: 10px; font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase; color: #f59e0b80; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased overflow-y-auto overflow-x-hidden">
    <!-- Fallback loading indicator shown before React mounts -->
    <div id="app-loading">
        <div class="spinner"></div>
        <p>Bahati Engine Initializing...</p>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var reloadKey = 'bahati-module-reload-once';

        function recoverFromModuleFailure() {
          try {
            if (sessionStorage.getItem(reloadKey) === '1') return;
            sessionStorage.setItem(reloadKey, '1');
            var next = new URL(window.location.href);
            next.searchParams.set('v', Date.now().toString());
            window.location.replace(next.toString());
          } catch (err) {
            window.location.reload();
          }
        }

        window.addEventListener('error', function(event) {
          var target = event && event.target;
          if (target && target.tagName === 'SCRIPT' && target.type === 'module') {
            console.warn('Module script failed to load, attempting one-time recovery.');
            recoverFromModuleFailure();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event && event.reason;
          var message = reason && (reason.message || String(reason));
          if (message && /Failed to fetch dynamically imported module|Importing a module script failed|error loading dynamically imported module/i.test(message)) {
            console.warn('Dynamic import failed after deployment, attempting one-time recovery.');
            recoverFromModuleFailure();
          }
        });

        window.addEventListener('load', function() {
          try {
            sessionStorage.removeItem(reloadKey);
          } catch (err) {
            console.warn('Failed to clear module reload guard.', err);
          }
        });
      })();
    </script>

    <!-- Entry Point -->
    <script type="module" src="./index.tsx"></script>

    <script>

      // Hide native loading overlay once React has rendered something in #root
      (function() {
        var loading = document.getElementById('app-loading');
        if (!loading) return;
        var observer = new MutationObserver(function() {
          if (document.getElementById('root').childNodes.length > 0) {
            loading.style.display = 'none';
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
        // Safety timeout: hide after 15s regardless
        setTimeout(function() { loading.style.display = 'none'; }, 15000);
      })();

      // Register Service Worker for PWA capabilities
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);

              // Detect when a new SW is installed (waiting to activate)
              // and notify the React app so it can show an update banner.
              function notifyUpdate(reg) {
                if (reg.waiting) {
                  window.dispatchEvent(new CustomEvent('sw-update-ready', { detail: { registration: reg } }));
                }
              }

              // New SW found while page is open
              registration.addEventListener('updatefound', function() {
                var newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    notifyUpdate(registration);
                  }
                });
              });

              // SW already waiting when page loaded (e.g. hard refresh)
              notifyUpdate(registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
</body>
</html>
