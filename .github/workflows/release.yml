name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.6)'
        required: true
        type: string

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm run typecheck
      - run: npm run test:ci

  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "version_code=$(git rev-list --count HEAD 2>/dev/null || echo 1)" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APP_VERSION_CODE: ${{ steps.build_meta.outputs.version_code }}
          APP_GIT_SHA: ${{ steps.build_meta.outputs.git_sha }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Validate release signing secrets
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash

      - name: Decode keystore
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/bahati.keystore
          KEYSTORE_SIZE=$(wc -c < android/app/bahati.keystore)
          if [ "$KEYSTORE_SIZE" -eq 0 ]; then
            echo "::error::Decoded keystore is empty."
            rm -f android/app/bahati.keystore
            exit 1
          else
            echo "Keystore decoded: ${KEYSTORE_SIZE} bytes"
            if keytool -list \
                -keystore android/app/bahati.keystore \
                -storepass "${KEYSTORE_PASSWORD}" \
                -storetype PKCS12 -noprompt 2>/dev/null; then
              echo "Keystore is Java-compatible, no conversion needed."
            else
              echo "Keystore needs conversion — applying OpenSSL legacy re-encode..."
              openssl pkcs12 \
                -in android/app/bahati.keystore \
                -passin "pass:${KEYSTORE_PASSWORD}" \
                -passout "pass:${KEYSTORE_PASSWORD}" \
                -out android/app/bahati-compat.keystore \
                -legacy 2>/dev/null \
              || openssl pkcs12 \
                -in android/app/bahati.keystore \
                -passin "pass:${KEYSTORE_PASSWORD}" \
                -passout "pass:${KEYSTORE_PASSWORD}" \
                -out android/app/bahati-compat.keystore
              mv android/app/bahati-compat.keystore android/app/bahati.keystore
              echo "Keystore converted."
            fi
            echo "KEYSTORE_FILE=bahati.keystore" >> "$GITHUB_ENV"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        shell: bash

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify release APK signature
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Release APK not found: $APK_PATH"
            exit 1
          fi

          APKSIGNER_PATH=$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort | tail -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "::error::apksigner not found under ${ANDROID_HOME}/build-tools"
            exit 1
          fi

          "$APKSIGNER_PATH" verify --print-certs "$APK_PATH"
        shell: bash

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-release.apk"
          # Also create a stable "latest" filename for the update URL
          cp "$APK_PATH" "android/app/build/outputs/apk/bahati-latest-release.apk" 2>/dev/null || true
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "$DEST"
          fi

      - name: Update version.json in repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B release-version-json origin/main
          REPO="${{ github.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="$(git rev-list --count HEAD 2>/dev/null || echo 1)"
          GIT_SHA="${{ github.sha }}"
          TAG="${{ inputs.tag || github.ref_name }}"
          RELEASED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/bahati-latest-release.apk"
          node -e "
            const fs = require('fs');
            fs.writeFileSync('public/version.json', JSON.stringify({
              version: '${VERSION}',
              versionCode: Number('${VERSION_CODE}') || undefined,
              gitSha: '${GIT_SHA}',
              tag: '${TAG}',
              releasedAt: '${RELEASED_AT}',
              apkUrl: '${APK_URL}',
              releaseNotes: 'v${VERSION} — 正式发布'
            }, null, 2) + '\n');
          "
          node scripts/sync-pwa-cache-version.cjs
          git add public/version.json public/sw.js
          if git diff --cached --quiet; then
            echo "No version metadata changes to push."
            exit 0
          fi

          git commit -m "chore: update version.json to v${VERSION} [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push version metadata back to main after ${attempt} attempts."
              exit 1
            fi

            sleep $((attempt * 2))
            git fetch origin main
            git rebase origin/main
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload APK
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          # Create release with APKs attached in one atomic call (draft→publish)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "v${VERSION} — 正式发布" \
            android/app/build/outputs/apk/bahati-*.apk \
            || gh release upload "$TAG" \
                 android/app/build/outputs/apk/bahati-*.apk \
                 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: bahati-release-apk
          path: android/app/build/outputs/apk/bahati-*.apk
          retention-days: 90
          if-no-files-found: error
