# Automatically push Supabase migrations to the production project on every
# merge to main.  Requires three repository secrets:
#   SUPABASE_ACCESS_TOKEN  – personal access token from supabase.com/account/tokens
#   SUPABASE_DB_PASSWORD   – database password for the linked project
#   SUPABASE_PROJECT_ID    – project ref (e.g. yctsiudhicztvppddbvk)

name: Deploy Supabase Migrations

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"

# Prevent concurrent migration runs so commits are applied serially in order.
concurrency:
  group: supabase-production-migrate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Verify required secrets are set
        run: |
          missing=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_DB_PASSWORD"  ] && missing+=("SUPABASE_DB_PASSWORD")
          [ -z "$SUPABASE_PROJECT_ID"   ] && missing+=("SUPABASE_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them under Repository → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations to production
        run: supabase db push
