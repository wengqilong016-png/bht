name: Repository Quality

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (strict CI mode)
        run: npm run test:ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
          VITE_GEMINI_API_KEY: test-gemini-key
          VITE_STATUS_API_BASE: http://localhost:5000
          VITE_INTERNAL_API_KEY: test-internal-key
          VITE_GOOGLE_MAPS_API_KEY: test-maps-key
