name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  build-apk:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/bahati.keystore
        shell: bash

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' && !startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: app/bahati.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [[ "$BUILD_TYPE" == "release" ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
            DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-debug.apk"
          fi
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "$DEST"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bahati-apk-${{ github.event.inputs.build_type || 'release' }}
          path: android/app/build/outputs/apk/bahati-*.apk
          retention-days: 30
          if-no-files-found: warn
