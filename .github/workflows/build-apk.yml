name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  build-apk:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/') || (github.ref == 'refs/heads/main' && github.event_name == 'push')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/bahati.keystore
          KEYSTORE_SIZE=$(wc -c < android/app/bahati.keystore)
          if [ "$KEYSTORE_SIZE" -eq 0 ]; then
            echo "WARNING: ANDROID_KEYSTORE_BASE64 secret is not set. Building unsigned APK."
            rm android/app/bahati.keystore
          else
            echo "Keystore decoded: ${KEYSTORE_SIZE} bytes"
            # Verify Java can read the keystore directly
            if keytool -list \
                -keystore android/app/bahati.keystore \
                -storepass "${KEYSTORE_PASSWORD}" \
                -storetype PKCS12 -noprompt 2>/dev/null; then
              echo "Keystore is Java-compatible, no conversion needed."
            else
              echo "Keystore needs conversion — applying OpenSSL legacy re-encode..."
              openssl pkcs12 \
                -in android/app/bahati.keystore \
                -passin "pass:${KEYSTORE_PASSWORD}" \
                -passout "pass:${KEYSTORE_PASSWORD}" \
                -out android/app/bahati-compat.keystore \
                -legacy 2>/dev/null \
              || openssl pkcs12 \
                -in android/app/bahati.keystore \
                -passin "pass:${KEYSTORE_PASSWORD}" \
                -passout "pass:${KEYSTORE_PASSWORD}" \
                -out android/app/bahati-compat.keystore
              mv android/app/bahati-compat.keystore android/app/bahati.keystore
              echo "Keystore converted."
            fi
            echo "KEYSTORE_FILE=bahati.keystore" >> "$GITHUB_ENV"
            echo "SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        shell: bash

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && github.event.inputs.build_type != 'release')
        run: cd android && ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          IS_TAG="${{ startsWith(github.ref, 'refs/tags/') }}"
          if [[ "$BUILD_TYPE" == "release" ]] || [[ "$IS_TAG" == "true" ]]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
            DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-debug.apk"
          fi
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "$DEST"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bahati-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: android/app/build/outputs/apk/bahati-*.apk
          retention-days: 30
          if-no-files-found: warn
