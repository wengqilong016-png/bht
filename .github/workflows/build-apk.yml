name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
    paths-ignore:
      - public/version.json
      - public/sw.js
      - public/downloads/**

# Only one Android build at a time; cancel older builds for the same ref.
concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build type
        id: resolve_build_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          elif [[ "${{ github.ref }}" == refs/tags/* || "${{ github.ref }}" == "refs/heads/main" ]]; then
            BUILD_TYPE="release"
          else
            BUILD_TYPE="debug"
          fi

          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "Resolved build type: ${BUILD_TYPE}"

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compute build metadata
        id: build_meta
        run: |
          echo "version_code=$(git rev-list --count HEAD 2>/dev/null || echo 1)" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          APP_VERSION_CODE: ${{ steps.build_meta.outputs.version_code }}
          APP_GIT_SHA: ${{ steps.build_meta.outputs.git_sha }}

      - name: Sync Capacitor
        run: |
          node scripts/prune-android-web-assets.cjs
          npx cap sync android

      - name: Validate release signing secrets
        if: steps.resolve_build_type.outputs.build_type == 'release'
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash

      - name: Decode keystore
        if: steps.resolve_build_type.outputs.build_type == 'release'
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/bahati.keystore
          KEYSTORE_SIZE=$(wc -c < android/app/bahati.keystore)
          if [ "$KEYSTORE_SIZE" -eq 0 ]; then
            echo "::error::Decoded keystore is empty."
            rm -f android/app/bahati.keystore
            exit 1
          else
            echo "Keystore decoded: ${KEYSTORE_SIZE} bytes"
            # Verify Java can read the keystore directly
            if keytool -list \
                -keystore android/app/bahati.keystore \
                -storepass "${KEYSTORE_PASSWORD}" \
                -storetype PKCS12 -noprompt 2>/dev/null; then
              echo "Keystore is Java-compatible, no conversion needed."
            else
              echo "Keystore needs conversion — applying OpenSSL legacy re-encode..."
              openssl pkcs12 \
                -in android/app/bahati.keystore \
                -passin "pass:${KEYSTORE_PASSWORD}" \
                -passout "pass:${KEYSTORE_PASSWORD}" \
                -out android/app/bahati-compat.keystore \
                -legacy 2>/dev/null \
              || openssl pkcs12 \
                -in android/app/bahati.keystore \
                -passin "pass:${KEYSTORE_PASSWORD}" \
                -passout "pass:${KEYSTORE_PASSWORD}" \
                -out android/app/bahati-compat.keystore
              mv android/app/bahati-compat.keystore android/app/bahati.keystore
              echo "Keystore converted."
            fi
            echo "KEYSTORE_FILE=bahati.keystore" >> "$GITHUB_ENV"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        shell: bash

      - name: Build Debug APK
        if: steps.resolve_build_type.outputs.build_type == 'debug'
        run: cd android && ./gradlew assembleDebug

      - name: Build Release APK
        if: steps.resolve_build_type.outputs.build_type == 'release'
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify release APK signature
        if: steps.resolve_build_type.outputs.build_type == 'release'
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Release APK not found: $APK_PATH"
            exit 1
          fi

          APKSIGNER_PATH=$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort | tail -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "::error::apksigner not found under ${ANDROID_HOME}/build-tools"
            exit 1
          fi

          "$APKSIGNER_PATH" verify --print-certs "$APK_PATH"
        shell: bash

      - name: Verify APK does not contain update downloads
        run: |
          BUILD_TYPE="${{ steps.resolve_build_type.outputs.build_type }}"
          if [[ "$BUILD_TYPE" == "release" ]]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          fi

          if unzip -l "$APK_PATH" | grep -E 'assets/public/downloads/.*\.apk'; then
            echo "::error::APK contains an embedded update APK. Run scripts/prune-android-web-assets.cjs before Capacitor sync."
            exit 1
          fi

      - name: Bump patch version & update version.json (release builds only)
        if: github.event_name == 'workflow_dispatch' && steps.resolve_build_type.outputs.build_type == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p 'require("./package.json").version')
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/${REPO}/releases/latest/download/bahati-latest-release.apk"
          node -e "
            const fs = require('fs');
            fs.writeFileSync('public/version.json', JSON.stringify({
              version: '${NEW_VERSION}',
              apkUrl: '${APK_URL}',
              releaseNotes: 'v${NEW_VERSION} released'
            }, null, 2) + '\n');
          "
          git add package.json package-lock.json public/version.json
          git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ steps.resolve_build_type.outputs.build_type }}"
          if [[ "$BUILD_TYPE" == "release" ]]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
            DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-release.apk"
            cp "$APK_PATH" "android/app/build/outputs/apk/bahati-latest-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            DEST="android/app/build/outputs/apk/bahati-v${{ steps.version.outputs.version }}-debug.apk"
          fi
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "$DEST"
          fi

      - name: Update remote update manifest
        id: update_manifest
        if: github.ref == 'refs/heads/main' && steps.resolve_build_type.outputs.build_type == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.build_meta.outputs.version_code }}"
          GIT_SHA="${{ steps.build_meta.outputs.git_sha }}"
          SHORT_SHA="${{ steps.build_meta.outputs.short_sha }}"
          RELEASED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/bahati-latest-release.apk public/downloads/bahati-latest-release.apk
          APK_URL="https://bahatiwin.space/downloads/bahati-latest-release.apk"
          node -e "
            const fs = require('fs');
            fs.writeFileSync('public/version.json', JSON.stringify({
              version: '${VERSION}',
              versionCode: Number('${VERSION_CODE}') || undefined,
              gitSha: '${GIT_SHA}',
              tag: 'main-latest',
              releasedAt: '${RELEASED_AT}',
              apkUrl: '${APK_URL}',
              releaseNotes: 'main build ${VERSION} (${SHORT_SHA})'
            }, null, 2) + '\n');
          "
          node scripts/sync-pwa-cache-version.cjs
          if git diff --quiet -- public/version.json public/sw.js public/downloads/bahati-latest-release.apk; then
            echo "manifest and apk already up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add public/version.json public/sw.js public/downloads/bahati-latest-release.apk
          git commit -m "chore: refresh update manifest for ${SHORT_SHA}"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install Vercel CLI
        if: github.ref == 'refs/heads/main' && steps.resolve_build_type.outputs.build_type == 'release' && steps.update_manifest.outputs.changed == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: github.ref == 'refs/heads/main' && steps.resolve_build_type.outputs.build_type == 'release' && steps.update_manifest.outputs.changed == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy refreshed update manifest to Vercel
        if: github.ref == 'refs/heads/main' && steps.resolve_build_type.outputs.build_type == 'release' && steps.update_manifest.outputs.changed == 'true'
        run: |
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: bahati-apk-${{ steps.resolve_build_type.outputs.build_type }}
          path: android/app/build/outputs/apk/bahati-*.apk
          retention-days: 30
          if-no-files-found: error
