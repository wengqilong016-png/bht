name: Setup Node & Install Dependencies
description: Setup Node.js, enable npm cache, and (optionally) run npm ci.

inputs:
  node-version:
    description: Node.js version to use
    required: false
    default: "22"
  install:
    description: Whether to run npm ci
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: npm ci
